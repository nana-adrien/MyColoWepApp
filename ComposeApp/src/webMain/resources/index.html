<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   style-src 'self' 'unsafe-inline';
                   script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval';
                   img-src 'self' data: blob:;
                   font-src 'self' data:;
                   connect-src 'self' https: wss:;">
    <title>MyColoApp</title>

    <!-- ✅ Télécharge en parallèle avant que app.js les demande -->
    <link rel="preload" href="ComposeApp.js" as="script">
    <link rel="preload" href="ComposeApp.wasm" as="fetch" crossorigin>
    <link rel="preload" href="skiko.wasm" as="fetch" crossorigin>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 100;
            transition: opacity 0.4s ease;
        }

        #root {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>
<iframe id="loader" src="loading.html"></iframe>
<div id="root"></div>

<script src="ComposeApp.js"></script>
<!-- index.html -->
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
<script>
    // ✅ Masque le loader quand Compose est prêt
    window.hideLoader = function () {
        const loader = document.getElementById('loader');
        const root = document.getElementById('root');
        loader.style.opacity = '0';
        loader.style.transition = 'opacity 0.4s ease';
        root.style.opacity = '1';
        setTimeout(() => loader.remove(), 400);
    };
</script>
</body>
</html>
